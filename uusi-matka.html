<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uusi matka</title>
  <link rel="stylesheet" href="tyylit.css">
</head>
<body>
<div class="app">
<header class="page-top soft-top">
  <button class="back" onclick="history.back()">‹</button>
  <div><div class="logo-script page-logo">Uusi matka <span class="brand-heart">♡</span></div><p>Tallenna reissu ja lisää muistot.</p></div>
  <button class="round-light" onclick="saveTrip()">Luo</button>
</header>
<main class="content">
  <section class="card new-cover">
    <div class="photo" style="min-height:180px;display:grid;place-items:center;color:#fff;font-weight:900;background-image:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.35)),url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=700&q=80')">📷 Oletuskuva · vaihda myöhemmin</div>
  </section>
  <section class="section form">
    <div class="field"><label>Matkan nimi</label><input id="tripName" placeholder="Esim. Kesäloma 2026"></div>
    <div class="grid2"><div class="field"><label>Alkaa</label><input type="date"></div><div class="field"><label>Päättyy</label><input type="date"></div></div>
    <button class="primary" onclick="saveTrip()">Luo matka</button>
    <p class="form-hint">Matkan tyyppi, matkaseurue ja muut tiedot lisätään tarvittaessa oman matkan sivulla.</p>
  </section>
</main>
